version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: pbc-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: hosting_bot

  redis:
    image: redis:7-alpine
    container_name: pbc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build: .
    container_name: pbc-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - ./temp:/app/temp
      - ./logs:/app/logs

volumes:
  mongo_data:
  redis_data:
